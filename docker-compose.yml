version: '3.8'

services:
  fraud-detection-api:
    build: .
    container_name: upi-fraud-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    environment:
      - DEBUG=True
      - LOG_LEVEL=INFO
      - FRAUD_THRESHOLD=0.7
      - MIN_TRANSACTION_AMOUNT=10000
      - GNN_ENABLED=True
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add Redis for caching
